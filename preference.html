<!DOCTYPE html><html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriMitra - Preference</title>
  <style>
    * {
      box-sizing: border-box;
    }body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #1e1e2f, #3a3a5f);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  color: white;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
  text-align: center;
}

.card {
  background: #2a2a40;
  padding: 30px 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  margin-bottom: 30px;
}

h2 {
  color: #ffcc80;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: linear-gradient(to right, #ff416c, #ff4b2b);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  border-radius: 25px;
}

button:hover {
  opacity: 0.9;
}

ul {
  padding-left: 20px;
}

#weatherResult, #formMessage {
  margin-top: 10px;
  font-weight: 500;
}

  </style>
</head>
<body>
  <h1>🌾 AgriMitra - तुमची माहिती</h1>  <div class="card">
    <h2>☀️ तुमच्या गावाचं हवामान</h2>
    <input type="text" id="cityInput" placeholder="गावाचं नाव टाका (उदा: Washim)" />
    <button onclick="getWeather()">हवामान तपासा</button>
    <div id="weatherResult"></div>
  </div>  <div class="card">
    <h2>📢 सरकारी योजना</h2>
    <ul>
      <li>🔹 प्रधानमंत्री किसान सन्मान निधी योजना</li>
      <li>🔹 पीक विमा योजना</li>
      <li>🔹 ट्रॅक्टर व सिंचनासाठी सबसिडी</li>
      <li>🔹 कृषी यांत्रिकीकरण योजना</li>
      <li>🔹 मृदा आरोग्य कार्ड योजना</li>
    </ul>
  </div>  <div class="card">
    <h2>📝 शेतकरी माहिती फॉर्म</h2>
    <form onsubmit="submitForm(event)">
      <input type="text" id="name" placeholder="नाव" required />
      <input type="text" id="village" placeholder="गाव" required />
      <select id="crop">
        <option value="">पीक निवडा</option>
        <option>सोयाबीन</option>
        <option>कांदा</option>
        <option>गहू</option>
        <option>तूर</option>
      </select>
      <input type="tel" id="phone" placeholder="फोन नंबर" required pattern="[0-9]{10}" />
      <button type="submit">पाठवा</button>
    </form>
    <p id="formMessage"></p>
  </div>  <!-- Firebase SDKs -->  <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA5tM-5HRT-_0DLN7VgggOP_2G8sllO3Ko",
      authDomain: "agrimitra-1350d.firebaseapp.com",
      projectId: "agrimitra-1350d",
      storageBucket: "agrimitra-1350d.appspot.com",
      messagingSenderId: "1048874744051",
      appId: "1:1048874744051:web:bba0ae849ebe1a7a249f86",
      measurementId: "G-9XY1XH231E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function submitForm(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const village = document.getElementById('village').value;
      const crop = document.getElementById('crop').value;
      const phone = document.getElementById('phone').value;

      db.collection("farmers").add({
        name,
        village,
        crop,
        phone,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        document.getElementById('formMessage').innerText = `✅ माहिती सेव्ह झाली! धन्यवाद, ${name}!`;
      })
      .catch(error => {
        document.getElementById('formMessage').innerText = `❌ त्रुटी: ${error.message}`;
      });
    }

    async function getWeather() {
      const city = document.getElementById('cityInput').value;
      const apiKey = "YOUR_API_KEY"; // Replace with OpenWeatherMap API key
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=mr`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.cod === 200) {
          document.getElementById('weatherResult').innerHTML = `
            <p><strong>${data.name}</strong> मधील हवामान:</p>
            <p>🌡️ तापमान: ${data.main.temp}°C</p>
            <p>☁️ स्थिती: ${data.weather[0].description}</p>
          `;
        } else {
          document.getElementById('weatherResult').innerHTML = `<p style="color:red;">गाव सापडला नाही</p>`;
        }
      } catch (err) {
        document.getElementById('weatherResult').innerHTML = `<p style="color:red;">त्रुटी: ${err.message}</p>`;
      }
    }
  </script></body>
</html>
